name: Deploy (prod)
'on':
  push:
    branches:
      - master
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment:
          - lszt_prod
          - lszm_prod
          - lspv_prod
          - lsze_prod
          - lszo_prod
    environment: ${{ matrix.environment }}
    steps:
      - run: echo 'Running deplyoment for project ${{ vars.PROJECT }}'
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build:prod --project=${{ vars.PROJECT }}
      - uses: w9jds/setup-firebase@main
        with:
          project_id: ${{ vars.FIREBASE_PROJECT }}
          tools-version: 14
          firebase_token: ${{ secrets.FIREBASE_TOKEN }}
      - run: firebase target:apply database main ${{ vars.FIREBASE_RTDB_NAME }}
      - run: firebase deploy --only hosting,database:main
  build_and_deploy_functions:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment:
          - lszt_prod
          - lszm_prod
          - lspv_prod
          - lsze_prod
          - lszo_prod
    environment: ${{ matrix.environment }}
    steps:
      - run: echo 'Running functions deplyoment for project ${{ vars.PROJECT }}'
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: w9jds/setup-firebase@main
        with:
          project_id: ${{ vars.FIREBASE_PROJECT }}
          tools-version: 14
          firebase_token: ${{ secrets.FIREBASE_TOKEN }}
      - run: cd functions && npm ci && cd ..
      - name: Generate functions/privacy-config.generated.js from project config
        run: |
          PRIVACY_FUNCTIONS_ENABLED=$(node -e "
            const def = require('./projects/default.json');
            const proj = require('./projects/${{ vars.PROJECT }}.json');
            process.stdout.write(({ ...def, ...proj }).privacySettings === true ? 'true' : 'false');
          ")
          echo "module.exports = $PRIVACY_FUNCTIONS_ENABLED;" > functions/privacy-config.generated.js
      - name: Generate functions/member-management.generated.js from project config
        run: |
          MEMBER_MANAGEMENT_ENABLED=$(node -e "
            const def = require('./projects/default.json');
            const proj = require('./projects/${{ vars.PROJECT }}.json');
            process.stdout.write(({ ...def, ...proj }).memberManagement === true ? 'true' : 'false');
          ")
          echo "module.exports = $MEMBER_MANAGEMENT_ENABLED;" > functions/member-management.generated.js
      - name: Write functions/.env.${{ vars.FIREBASE_PROJECT }} from environment vars
        run: |
          cat > functions/.env.${{ vars.FIREBASE_PROJECT }} <<EOF
          RTDB_URL=${{ vars.FIREBASE_RTDB_URL }}
          RTDB_INSTANCE=${{ vars.FIREBASE_RTDB_NAME }}
          RTDB_REGION=${{ vars.RTDB_REGION }}
          API_SERVICEUSER_USERNAME=${{ vars.API_SERVICEUSER_USERNAME }}
          API_SERVICEUSER_PASSWORD=${{ secrets.API_SERVICEUSER_PASSWORD }}
          AUTH_STATIC_CREDENTIALS=${{ secrets.AUTH_STATIC_CREDENTIALS }}
          TESTING_ENABLED=${{ vars.TESTING_ENABLED }}
          WEBAUTHN_RPID=${{ vars.WEBAUTHN_RPID }}
          WEBAUTHN_RPNAME=${{ vars.WEBAUTHN_RPNAME }}
          WEBAUTHN_ORIGINS=${{ vars.WEBAUTHN_ORIGINS }}
          EOF
      - run: firebase deploy --only functions
