name: Deploy (prod)
'on':
  push:
    branches:
      - master
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment:
          - lszt_prod
          - lszm_prod
          - lspv_prod
          - lsze_prod
          - lszo_prod
    environment: ${{ matrix.environment }}
    steps:
      - run: echo 'Running deplyoment for project ${{ vars.PROJECT }}'
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build:prod --project=${{ vars.PROJECT }}
      - uses: w9jds/setup-firebase@main
        with:
          project_id: ${{ vars.FIREBASE_PROJECT }}
          tools-version: 13
          firebase_token: ${{ secrets.FIREBASE_TOKEN }}
      - run: firebase target:apply database main ${{ vars.FIREBASE_RTDB_NAME }}
      - run: firebase deploy --only hosting,database:main
  build_and_deploy_functions:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment:
          - lszt_prod
          - lszm_prod
          - lspv_prod
          - lsze_prod
          - lszo_prod
    environment: ${{ matrix.environment }}
    steps:
      - run: echo 'Running functions deplyoment for project ${{ vars.PROJECT }}'
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: w9jds/setup-firebase@main
        with:
          project_id: ${{ vars.FIREBASE_PROJECT }}
          tools-version: 13
          firebase_token: ${{ secrets.FIREBASE_TOKEN }}
      - run: cd functions && npm ci && cd ..
      - name: Resolve RTDB env vars for deploy
        env:
          FIREBASE_RTDB_NAME: ${{ vars.FIREBASE_RTDB_NAME }}
          FIREBASE_RTDB_URL: ${{ vars.FIREBASE_RTDB_URL }}
        run: |
          URL="${FIREBASE_RTDB_URL}"
          if [ -z "$URL" ]; then
            URL="https://${FIREBASE_RTDB_NAME}.firebaseio.com"
          fi
          {
            echo "RTDB_INSTANCE=${FIREBASE_RTDB_NAME}"
            echo "RTDB_URL=${URL}"
          } >> "$GITHUB_ENV"
      - run: firebase deploy --only functions
